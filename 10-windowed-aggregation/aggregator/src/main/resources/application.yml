server:
  port: 8081

spring:
  application:
    name: dashboard-aggregator
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: count-logger-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted-packages: "com.playbook.*"
        spring.json.type.mapping: categoryCount:com.playbook.aggregator.model.CategoryCount
    streams:
      application-id: dashboard-aggregator
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: org.springframework.kafka.support.serializer.JsonSerde
        spring.json.trusted.packages: "com.playbook.*"
        commit.interval.ms: 1000

management:
  endpoints:
    web:
      exposure:
        include: health
