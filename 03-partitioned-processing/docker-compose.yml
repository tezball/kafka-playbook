services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 5s
      timeout: 10s
      retries: 15

  producer:
    build: ./producer
    container_name: order-producer
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  na-consumer:
    build: ./consumer
    container_name: na-consumer
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONSUMER_REGION: NA
      CONSUMER_GROUP: na-region-group
      SERVER_PORT: 8081
    depends_on:
      kafka:
        condition: service_healthy

  eu-consumer:
    build: ./consumer
    container_name: eu-consumer
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONSUMER_REGION: EU
      CONSUMER_GROUP: eu-region-group
      SERVER_PORT: 8082
    depends_on:
      kafka:
        condition: service_healthy

  apac-consumer:
    build: ./consumer
    container_name: apac-consumer
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONSUMER_REGION: APAC
      CONSUMER_GROUP: apac-region-group
      SERVER_PORT: 8083
    depends_on:
      kafka:
        condition: service_healthy

  akhq:
    image: tchiotludo/akhq:0.25.1
    container_name: akhq
    ports:
      - "8888:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            kafka-playbook:
              properties:
                bootstrap.servers: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
