server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: region-consumer-${CONSUMER_REGION:NA}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${CONSUMER_GROUP:na-region-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted-packages: "com.playbook.*"
        spring.json.type.mapping: regionalOrderEvent:com.playbook.consumer.model.RegionalOrderEvent

consumer:
  region: ${CONSUMER_REGION:NA}

management:
  endpoints:
    web:
      exposure:
        include: health
